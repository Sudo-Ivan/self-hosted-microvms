name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  templates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate template layout
        run: ./scripts/validate-templates.sh

      - name: POSIX shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck dash bubblewrap
          ./scripts/check-posix.sh

      - name: Harden smoke
        run: sudo ./scripts/test-harden.sh

      - name: List templates
        run: ./mvm templates

      - name: Sample info
        run: ./mvm info vaultwarden

  secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
          check-latest: true
          cache-dependency-path: go.sum

      - name: go fmt
        run: |
          out="$(gofmt -l ./cmd/mvmsec)"
          if [ -n "${out}" ]; then
            echo "gofmt needed on:" >&2
            echo "${out}" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./cmd/mvmsec/...

      - name: go test
        run: go test ./cmd/mvmsec/...

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          "$(go env GOPATH)/bin/gosec" -quiet ./cmd/mvmsec/...

      - name: Build mvmsec
        run: ./scripts/build-mvmsec.sh

      - name: Secrets smoke
        run: ./scripts/test-secrets.sh
